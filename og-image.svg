<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF7F2"/>
      <stop offset="100%" style="stop-color:#EDE4D8"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="32" flood-color="#E5967A" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Moon -->
  <text x="600" y="218" text-anchor="middle"
        font-size="110" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif"
        filter="url(#glow)">🌙</text>

  <!-- Nappy wordmark -->
  <text x="600" y="348" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="120" font-weight="600" fill="#4A3828" letter-spacing="-3">Nappy<tspan fill="#E5967A" font-style="italic">.</tspan></text>

  <!-- Subtitle -->
  <text x="600" y="412" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="400" fill="#8A7260" letter-spacing="2">Baby Nap Planner</text>
</svg>
